<!doctype html>
<!--Define que o documento está usando HTML5-->
<html lang="pt-BR">
  <!--Tag raiz do documento. Lang define o idioma da página-->
  <head>
    <!--Cabeçalho da página invisível para o usuário-->
    <meta charset="UTF-8" />
    <!--Define a codificação dos caracteres (acentos funcionando corretamente)-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--Faz a página se adaptar a celulares e tablets-->
    <title>sonic</title>
    <!--Título que aparece na aba do navegador-->
  </head>
  <body>
    <!--Corpo da página (tudo que aparece para o usuário)-->
    <header>
      <!--Cabeçalho visível da página-->
      <img src="sonic.jpg" alt="sonic height="100%" width="200px" />
      <!--img Exibe uma imagem-->
      <!--src = caminho da imagem-->
      <!--alt = texto de referência da imagem-->
      <!--width = largura da imagem-->
      <!--height = altura da imagem-->
      <nav>
        <!-- Área de navegação-->
        <a href="#sobre o sonic">sobre o sonic</a>
      <a href="https://xbox.com"
        target="_blank">xbox</a>
        <a href="#jogos">jogos</a>
        <a href="https://minecraft.net"
       target="_blank">minecraft</a>
        <a href="https://youtube.com" target="_blank">YouTube</a>
        <!--Tag <a> cria um link-->
        <!--href = destino do site (página)-->
        <!--target="_blank" abre em uma nova aba-->
      </nav>
    </header>
    <main>
      <!--Conteúdo principal da página-->
      <h1>sobre o sonic e jogos em promosão</h1>
      <!--Título principal da página-->
      <img
        src="filmematrix.jpg"
        alt="Capa do filme Matrix Resurrections"
        width="200px"
        height="100%"
      />
      <h3>testes</h3>
      <p>
        este é apenas um teste drive etamos tetando anida está em beta a versão oficial vai chegar em breve
      </p>
    </main>
    <footer>
      <!--Rodapé da página informações gerais-->
      <label for="">Rodovia Raposo Tavares KM 316 a 318</label>
      <!--a tag label é um rótulo-->
      <label for="">Bairro das Bananeiras</label>
      <p>
        <a href="https://www.instagram.com/etecpirajuoficial/" target="_blank"
          ><b>@etecpirajuoficial</b></a
        >
      </p>
    </footer>
  </body>
</html>
